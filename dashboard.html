<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unigenda - Dashboard 2026</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <header class="main-header">

        <div id="btn-voltar" class="hidden" onclick="showDashboard()">
            <div class="button-box">
                <span class="button-elem">
                    <svg viewBox="0 0 46 40" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M46 20.038c0-.7-.3-1.5-.8-2.1l-16-17c-1.1-1-3.2-1.4-4.4-.3-1.2 1.1-1.2 3.3 0 4.4l11.3 11.9H3c-1.7 0-3 1.3-3 3s1.3 3 3 3h33.1l-11.3 11.9c-1 1-1.2 3.3 0 4.4 1.2 1.1 3.3.8 4.4-.3l16-17c.5-.5.8-1.1.8-1.9z">
                        </path>
                    </svg>
                </span>
                <span class="button-elem">
                    <svg viewBox="0 0 46 40">
                        <path
                            d="M46 20.038c0-.7-.3-1.5-.8-2.1l-16-17c-1.1-1-3.2-1.4-4.4-.3-1.2 1.1-1.2 3.3 0 4.4l11.3 11.9H3c-1.7 0-3 1.3-3 3s1.3 3 3 3h33.1l-11.3 11.9c-1 1-1.2 3.3 0 4.4 1.2 1.1 3.3.8 4.4-.3l16-17c.5-.5.8-1.1.8-1.9z">
                        </path>
                    </svg>
                </span>
            </div>
        </div>

        <h1 id="page-title">Calendário Acadêmico 2026</h1>
        <div class="header-buttons">

            <button onclick="abrirFormulario()" class="novocompri">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" viewBox="0 0 24 24" height="24" fill="none"
                    class="svg-icon">
                    <g stroke-width="2" stroke-linecap="round" stroke="#fff">
                        <rect y="5" x="4" width="16" rx="2" height="16"></rect>
                        <path d="m8 3v4"></path>
                        <path d="m16 3v4"></path>
                        <path d="m4 11h16"></path>
                    </g>
                </svg> <span>
                    Add
                </span>
            </button>

            <button id="btn-tracker" onclick="showTracker()">Atividades</button>

            <button  onclick="window.location.href='index.html'">
            <div class="sign">
                <svg viewBox="0 0 512 512">
                    <path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path>
                </svg>
            </div>
        </button>

        </div>
    </header>
    <div class="dashboard-wrapper">
        
        <aside class="sidebar-summary">
            <h2 class="summary-title">Resumo</h2>
            <div class="summary-card">
                <h3>Total de Atividades</h3>
                <p id="total-atividades">0</p>
            </div>
            <div class="summary-card">
                <h3>No Prazo</h3>
                <p id="atividades-no-prazo">0</p>
            </div>
            <div class="summary-card vencendo-card">
                <h3>Próximo do Prazo</h3>
                <p id="atividades-vencendo">0</p>
            </div>
        </aside>

        <div class="calendar-wrapper">
            <main id="year-grid" class="year-container">
                </main>

            <main id="view-month" class="hidden">
                <div class="calendar-controls"></div>
                <div class="calendar-detailed-grid" id="calendar-detailed-grid">
                </div>
            </main>
        </div>
        
    </div>
    


    <div id="modal-tarefa" class="modal hidden">
        <div class="modal-content-small">

            <h3 class="texto">Novo Compromisso</h3>
            <div class="modal-body">

                <input type="text" id="task-title" placeholder="Título da atividade">
                <input type="date" id="task-date">
                <input type="text" id="task-description" placeholder="Descrição">
                <select id="task-type">
                    <option value="entrega">Prova</option>
                    <option value="entrega">Entrega de Trabalho</option>
                </select>
                <div class="modal-actions">
                    <button onclick="salvarTarefa()" class="bnt-salvarmodal">Salvar </button>
                    <button onclick="fecharFormulario()" class="bnt-cancelarmodal">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="Javascript/dashboard.js"></script>
</body>

</html>
